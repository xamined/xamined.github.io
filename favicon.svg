<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle inner shadow for depth -->
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>

    <!-- Crisp shadow for the X letterform -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1A1C1A" flood-opacity="0.12"/>
    </filter>

    <!-- Clipping mask for rounded square -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background with generous rounding -->
  <g clip-path="url(#roundedClip)">
    <!-- Base cream fill -->
    <rect width="512" height="512" fill="#F8F5EF"/>

    <!-- Subtle paper texture lines -->
    <g stroke="#1A1C1A" opacity="0.025" stroke-width="0.5">
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
    </g>

    <!-- Ghost X watermark — large, faint -->
    <g opacity="0.04" transform="translate(256, 276)">
      <line x1="-200" y1="-200" x2="200" y2="200" stroke="#B5302A" stroke-width="80" stroke-linecap="round"/>
      <line x1="200" y1="-200" x2="-200" y2="200" stroke="#B5302A" stroke-width="80" stroke-linecap="round"/>
    </g>

    <!-- The X — two crossing strokes, slightly tapered feel via overlapping paths -->
    <g filter="url(#textShadow)" transform="translate(256, 266)">
      <!-- Back stroke (bottom-left to top-right) -->
      <line x1="-105" y1="120" x2="105" y2="-120" stroke="#1A1C1A" stroke-width="52" stroke-linecap="round"/>
      <!-- Front stroke (top-left to bottom-right) with red accent -->
      <line x1="-105" y1="-120" x2="105" y2="120" stroke="#B5302A" stroke-width="52" stroke-linecap="round"/>
    </g>

    <!-- Red rule accent — editorial signature -->
    <rect x="176" y="410" width="160" height="3" rx="1.5" fill="#B5302A" opacity="0.6"/>

    <!-- Subtle corner accents (editorial crop marks) -->
    <g stroke="#1A1C1A" opacity="0.08" stroke-width="1.5" stroke-linecap="round">
      <!-- Top-left -->
      <line x1="48" y1="56" x2="48" y2="76"/>
      <line x1="48" y1="56" x2="68" y2="56"/>
      <!-- Top-right -->
      <line x1="464" y1="56" x2="464" y2="76"/>
      <line x1="464" y1="56" x2="444" y2="56"/>
      <!-- Bottom-left -->
      <line x1="48" y1="456" x2="48" y2="436"/>
      <line x1="48" y1="456" x2="68" y2="456"/>
      <!-- Bottom-right -->
      <line x1="464" y1="456" x2="464" y2="436"/>
      <line x1="464" y1="456" x2="444" y2="456"/>
    </g>
  </g>
</svg>
